name: Security Checks

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Secrets scan
        run: npm run security:scan-secrets

      - name: Backend production audit
        run: npm --prefix backend audit --omit=dev --audit-level=high

      - name: Frontend production audit
        run: npm --prefix frontend audit --omit=dev --audit-level=high
