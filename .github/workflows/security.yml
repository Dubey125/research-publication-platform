name: Security Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      zap_target_url:
        description: Full URL for OWASP ZAP baseline scan (for example https://staging.example.com)
        required: false
        type: string

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Secrets scan
        run: npm run security:scan-secrets

      - name: Backend production audit
        run: npm --prefix backend audit --omit=dev --audit-level=high

      - name: Frontend production audit
        run: npm --prefix frontend audit --omit=dev --audit-level=high

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

  zap_baseline:
    if: github.event_name == 'workflow_dispatch' && inputs.zap_target_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.zap_target_url }}
          fail_action: true
